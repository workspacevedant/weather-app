<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skyglass — Weather Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Ambient background glow — pure CSS atmosphere -->
    <div class="bg-glow" aria-hidden="true"></div>

    <div class="app-wrapper">

      <!-- ── Header ── -->
      <header class="app-header">
        <span class="wordmark">Skyglass</span>
        <span class="wordmark-sub">Weather</span>
      </header>

      <!-- ── Search ── -->
      <section class="search-section" aria-label="City search">
        <div class="search-bar">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            type="text"
            id="city-input"
            class="search-input"
            placeholder="Search city…"
            autocomplete="off"
            spellcheck="false"
            aria-label="Enter city name"
          />
          <button class="search-btn" id="search-btn" aria-label="Search">
            Go
          </button>
        </div>
      </section>

      <!-- ── Main weather card ── -->
      <main class="weather-card" id="weather-display" aria-live="polite">

        <!-- Default / empty state -->
        <div class="empty-state" id="empty-state">
          <div class="empty-icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none"
                 stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="24" cy="26" r="10"/>
              <path d="M34 26c0 .34-.02.67-.05 1H46a8 8 0 0 1 0 16H16a12 12 0 0 1-2-23.8"/>
            </svg>
          </div>
          <p class="empty-text">Enter a city above to get started.</p>
        </div>

        <!-- Weather content (hidden until JS populates it) -->
        <div class="weather-content" id="weather-content" hidden>

          <!-- City + Country -->
          <div class="city-block">
            <h1 class="city-name" id="city-name">—</h1>
            <span class="country-code" id="country-code"></span>
          </div>

          <!-- Weather icon placeholder + description -->
          <div class="condition-block">
            <div class="weather-icon-wrap" id="weather-icon-wrap" aria-hidden="true">
              <!-- JS will inject <img> from API here -->
            </div>
            <p class="condition-text" id="condition-text">—</p>
          </div>

          <!-- Temperature hero -->
          <div class="temp-block">
            <span class="temp-value" id="temp-value">—</span>
            <span class="temp-unit" id="temp-unit">°C</span>
          </div>

          <!-- Divider -->
          <hr class="card-divider" />

          <!-- Secondary stats grid -->
          <div class="stats-grid" role="list" aria-label="Weather details">

            <div class="stat-item" role="listitem">
              <div class="stat-icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 2a7 7 0 0 1 7 7c0 5.25-7 13-7 13S5 14.25 5 9a7 7 0 0 1 7-7z"/>
                  <circle cx="12" cy="9" r="2.5"/>
                </svg>
              </div>
              <span class="stat-value" id="humidity-value">—</span>
              <span class="stat-label">Humidity</span>
            </div>

            <div class="stat-item" role="listitem">
              <div class="stat-icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9.59 4.59A2 2 0 1 1 11 8H2"/>
                  <path d="M12.59 19.41A2 2 0 1 0 14 16H2"/>
                  <path d="M6.59 11.41A2 2 0 1 0 8 8H2"/>
                </svg>
              </div>
              <span class="stat-value" id="wind-value">—</span>
              <span class="stat-label">Wind Speed</span>
            </div>

            <div class="stat-item" role="listitem">
              <div class="stat-icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/>
                </svg>
              </div>
              <span class="stat-value" id="feels-like-value">—</span>
              <span class="stat-label">Feels Like</span>
            </div>

          </div><!-- /stats-grid -->

        </div><!-- /weather-content -->

        <!-- Error state -->
        <div class="error-state" id="error-state" hidden>
          <p class="error-text" id="error-message">City not found. Try again.</p>
        </div>

      </main><!-- /weather-card -->

      <!-- ── Footer ── -->
      <footer class="app-footer">
        <p>Powered by <span class="footer-accent">Open-Meteo</span> — no API key required</p>
      </footer>

    </div><!-- /app-wrapper -->

    <script src="app.js"></script>
  </body>
</html>
